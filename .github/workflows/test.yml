name: Tests

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  spm-tests:
    name: SPM Package Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test MeshCore
        run: swift test --package-path MeshCore

      - name: Test PocketMeshServices
        run: swift test --package-path PocketMeshServices

  xcode-tests:
    name: Xcode Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install xcodegen swiftgen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: .derivedData
          key: deriveddata-${{ hashFiles('**/*.swift', '**/project.yml') }}
          restore-keys: deriveddata-

      - name: Boot simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == 'iPhone 16e' and d['isAvailable']:
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -scheme PocketMesh \
            -destination "platform=iOS Simulator,name=iPhone 16e" \
            -derivedDataPath .derivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -scheme PocketMesh \
            -destination "platform=iOS Simulator,name=iPhone 16e" \
            -derivedDataPath .derivedData \
            -resultBundlePath TestResults.xcresult
