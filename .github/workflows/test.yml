name: Tests

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  spm-tests:
    name: SPM Package Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test MeshCore
        run: swift test --package-path MeshCore

      - name: Test PocketMeshServices
        run: swift test --package-path PocketMeshServices

  xcode-tests:
    name: Xcode Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
          command -v swiftgen >/dev/null 2>&1 || brew install swiftgen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache Xcode build
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-deriveddata-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            xcode-deriveddata-${{ github.workflow }}-
          deriveddata-directory: .derivedData
          delete-used-deriveddata-cache: true

      - name: Boot simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              for d in devices:
                  if d['name'] == 'iPhone 16e' and d['isAvailable']:
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$DEVICE_ID" || true

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -scheme PocketMesh \
            -destination "platform=iOS Simulator,name=iPhone 16e" \
            -derivedDataPath .derivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            GCC_GENERATE_DEBUGGING_SYMBOLS=NO

      - name: Run tests
        run: |
          xcodebuild test-without-building \
            -scheme PocketMesh \
            -destination "platform=iOS Simulator,name=iPhone 16e" \
            -derivedDataPath .derivedData \
            -resultBundlePath TestResults.xcresult \
            -parallel-testing-enabled NO \
            -enableCodeCoverage NO \
            -collect-test-diagnostics never
