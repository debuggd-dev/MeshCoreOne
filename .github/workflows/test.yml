name: Build

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  spm-tests:
    name: SPM Package Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Test MeshCore
        run: swift test --package-path MeshCore

      - name: Test PocketMeshServices
        run: swift test --package-path PocketMeshServices

  xcode-build:
    name: Xcode Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          command -v xcodegen >/dev/null 2>&1 || brew install xcodegen
          command -v swiftgen >/dev/null 2>&1 || brew install swiftgen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache Xcode build
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-deriveddata-${{ github.workflow }}-${{ github.sha }}
          restore-keys: |
            xcode-deriveddata-${{ github.workflow }}-
          deriveddata-directory: .derivedData
          delete-used-deriveddata-cache: true

      - name: Build
        run: |
          xcodebuild build \
            -scheme PocketMesh \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath .derivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
